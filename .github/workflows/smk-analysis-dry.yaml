name: smk-analysis-dry

on:
  pull_request:
    paths:
      - "workflows/**"
      - "config/**"
      - "scripts/**"
      - ".github/workflows/smk-analysis-dry.yaml"
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch: {}

concurrency:
  group: ci-smk-analysis-dry-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-file: config/emseq-conda-env.yaml
          environment-name: emseq
          cache-environment: true

      - name: Verify required files
        run: |
          set -euo pipefail
          test -f config/emseq-conda-env.yaml
          test -f workflows/test-analysis.smk
          test -f config/test.yaml

      - name: Snakemake dry-run (analysis)
        run: |
          micromamba run -n emseq snakemake \
          -s workflows/test-analysis.smk \
          --configfile config/test.yaml \
          --cores 4 \
          --dry-run \
          --printshellcmds \
          --rerun-incomplete \
          --resources concurrency=50
